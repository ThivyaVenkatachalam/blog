<!DOCTYPE html>
<html lang="en">
<head>
  <title>Blog - My Posts</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <nav class="navbar">
    <span class="logo">✍️ BlogAPI</span>
    <div class="nav-links">
      <a href="index.html">← All Posts</a>
      <a href="create.html" class="btn btn-primary">+ New Post</a>
      <a href="profile.html">Profile</a>
      <a href="#" onclick="logout()">Logout</a>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1 class="page-title">My Posts</h1>
      <span id="post-count" style="color:var(--muted);font-size:0.9rem"></span>
    </div>

    <div id="posts"></div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    const user  = JSON.parse(localStorage.getItem('user'));

    if (!token) window.location.href = 'login.html';

    async function loadMyPosts() {
      const res       = await fetch('http://localhost:4000/api/posts/my', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data      = await res.json();
      const container = document.getElementById('posts');

      if (!data.data.length) {
        container.innerHTML = `
          <div style="text-align:center;padding:3rem;color:var(--muted)">
            <p style="font-size:1.2rem">You haven't written any posts yet!</p>
            <a href="create.html" class="btn btn-primary" style="margin-top:1rem">
              Write your first post
            </a>
          </div>
        `;
        return;
      }

      document.getElementById('post-count').textContent =
        `${data.data.length} post${data.data.length > 1 ? 's' : ''}`;

      container.innerHTML = '';
      data.data.forEach(post => {
        container.innerHTML += `
          <div class="post-card">
            <div class="post-title"
              onclick="window.location.href='post.html?id=${post.id}'"
            >${post.title}</div>
            <div class="post-content">${post.content}</div>
            <div class="post-meta">
              <div class="meta-left">
                <span>${new Date(post.created_at).toLocaleDateString()}</span>
                <span class="comment-count">💬 ${post.comment_count}</span>
                <span class="comment-count">❤️ ${post.like_count}</span>
              </div>
              <div class="meta-right">
                <button class="btn btn-outline"
                  onclick="window.location.href='post.html?id=${post.id}'"
                >✏️ Edit</button>
                <button class="btn btn-danger"
                  onclick="deletePost(${post.id})"
                >Delete</button>
              </div>
            </div>
          </div>
        `;
      });
    }

    async function deletePost(id) {
      if (!confirm('Delete this post?')) return;
      const res  = await fetch(`http://localhost:4000/api/posts/${id}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();
      if (data.success) loadMyPosts();
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = 'login.html';
    }

    loadMyPosts();
  </script>
</body>
</html>
