<!DOCTYPE html>
<html lang="en">
<head>
  <title>Blog - Login</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <nav class="navbar">
    <span class="logo">✍️ Blog</span>
  </nav>

  <div class="form-card">
    <div class="form-title">Welcome Back 👋</div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@email.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••"/>
    </div>

    <button class="btn btn-primary" onclick="login()" style="width:100%">
      Login
    </button>

    <div id="message"></div>

    <p style="text-align:center;margin-top:1rem;font-size:0.875rem;color:var(--muted)">
      Don't have an account?
      <a href="register.html" style="color:var(--accent)">Register here</a>
    </p>
  </div>

  <script>
    // Already logged in? redirect
    if (localStorage.getItem('token')) window.location.href = 'index.html';

    async function login() {
      const email    = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showMsg('Email and password are required!', false);
        return;
      }

      const res  = await fetch('http://localhost:4000/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (data.success) {
        localStorage.setItem('token', data.data.token);
        localStorage.setItem('user',  JSON.stringify(data.data.user));
        window.location.href = 'index.html';
      } else {
        showMsg(data.message, false);
      }
    }

    function showMsg(msg, success) {
      const el = document.getElementById('message');
      el.className   = `alert ${success ? 'alert-success' : 'alert-error'}`;
      el.textContent = msg;
    }

    // Allow Enter key to login
    document.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
