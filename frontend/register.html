<!DOCTYPE html>
<html lang="en">
<head>
  <title>Blog - Register</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <nav class="navbar">
    <span class="logo">✍️ Blog</span>
  </nav>

  <div class="form-card">
    <div class="form-title">Create Account</div>

    <div class="form-group">
      <label>Name</label>
      <input type="text" id="name" placeholder="Your full name"/>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@email.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Min 6 characters"/>
    </div>

    <button class="btn btn-primary" onclick="register()" style="width:100%">
      Create Account
    </button>

    <div id="message"></div>

    <p style="text-align:center;margin-top:1rem;font-size:0.875rem;color:var(--muted)">
      Already have an account?
      <a href="login.html" style="color:var(--accent)">Login here</a>
    </p>
  </div>

  <script>
    // Already logged in? redirect
    if (localStorage.getItem('token')) window.location.href = 'index.html';

    async function register() {
      const name     = document.getElementById('name').value;
      const email    = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (!name || !email || !password) {
        showMsg('All fields are required!', false);
        return;
      }

      const res  = await fetch('http://localhost:4000/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      });
      const data = await res.json();

      if (data.success) {
        showMsg('Account created! Redirecting to login...', true);
        setTimeout(() => window.location.href = 'login.html', 1500);
      } else {
        showMsg(data.message, false);
      }
    }

    function showMsg(msg, success) {
      const el = document.getElementById('message');
      el.className   = `alert ${success ? 'alert-success' : 'alert-error'}`;
      el.textContent = msg;
    }
  </script>
</body>
</html>
