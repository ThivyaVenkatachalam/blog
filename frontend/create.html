<!DOCTYPE html>
<html lang="en">
<head>
  <title>Blog - Create Post</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <nav class="navbar">
    <span class="logo">✍️ Blog</span>
    <div class="nav-links">
      <a href="index.html">← Back</a>
    </div>
  </nav>

  <div class="form-card" style="max-width:600px">
    <div class="form-title">Create New Post</div>
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="title" placeholder="Post title"/>
    </div>
    <div class="form-group">
      <label>Content</label>
      <textarea id="content" placeholder="Write your post..."></textarea>
    </div>
    <button class="btn btn-primary" onclick="createPost()" style="width:100%">Publish Post</button>
    <div id="message"></div>
  </div>

  <script>
    if (!localStorage.getItem('token')) window.location.href = 'login.html';

    async function createPost() {
      const title   = document.getElementById('title').value;
      const content = document.getElementById('content').value;
      const token   = localStorage.getItem('token');

      const res  = await fetch('http://localhost:4000/api/posts', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ title, content })
      });
      const data = await res.json();

      if (data.success) {
        window.location.href = 'index.html';
      } else {
        const el = document.getElementById('message');
        el.className = 'alert alert-error';
        el.textContent = data.message;
      }
    }
  </script>
</body>
</html>
